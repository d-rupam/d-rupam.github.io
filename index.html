<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupam Das | Bio-Digital Hub</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #30363d;
            padding: 40px;
            border-radius: 10px;
            background-color: #161b22;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
        }
        h1 {
            color: #58a6ff;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
        }
        .btn {
            display: none; /* Hidden by default until verification */
            margin-top: 25px;
            padding: 10px 20px;
            color: #58a6ff;
            text-decoration: none;
            border: 1px solid #58a6ff;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #58a6ff;
            color: #0d1117;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }
        .turnstile-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        #status-text {
            color: #ff7b72; /* Red color for awaiting clearance */
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ Rupam Das ]</h1>
        <p>> System Status: Online</p>
        <p>> Role: Microbiology Student & Systems Architect</p>
        <p>> Location: Dum Dum Motijheel College (WBSU)</p>
        <p>> Security Protocol: <span id="status-text">Awaiting clearance...</span></p>
        
        <div class="turnstile-container">
            <div class="cf-turnstile" 
                 data-sitekey="0x4AAAAAADmmav-PDiBpGXou" 
                 data-theme="dark" 
                 data-callback="grantAccess">
            </div>
        </div>

        <a href="https://github.com/d-rupam" class="btn" id="terminal-btn">Initialize Main Terminal</a>
    </div>

    <script>
        function grantAccess() {
            
            document.querySelector('.turnstile-container').style.display = 'none';
        
            const statusText = document.getElementById('status-text');
            statusText.textContent = "Clearance Granted.";
            statusText.style.color = "#3fb950"; // Green color
            
            document.getElementById('terminal-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
